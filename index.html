<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/css/styles.css">
    <title>Sidebar</title>
</head>
<body>
    <nav id="sidebar">
        <div id="sidebar_content">
            <div id="user">
                <img src="src/images/gprec.png" id="user_avatar" alt="Avatar">
    
                <p id="user_infos">
                    <span class="item-description">
                        PELADAS DO G8
                    </span>
                    <span class="item-description">
                        PC Kennedy
                    </span>
                </p>
            </div>
    
            <ul id="side_items">
                <li class="side-item active">
                    <a href="#">
                        <i class="fa-solid fa-chart-line"></i>
                        <span class="item-description">
                            Dashboard
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-user"></i>
                        <span class="item-description">
                            Usuários
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-bell"></i>
                        <span class="item-description">
                            Notificações
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-box"></i>
                        <span class="item-description">
                            Produtos
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-image"></i>
                        <span class="item-description">
                            Imagens
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-gear"></i>
                        <span class="item-description">
                            Configurações
                        </span>
                    </a>
                </li>
            </ul>
    
            <button id="open_btn">
                <i id="open_btn_icon" class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <div id="logout">
            <button id="logout_btn">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="item-description">
                    Logout
                </span>
            </button>
        </div>
    </nav>

    <main>
            <div class="container-selecao">
                <button id="abrirModal">Selecione Agenda</button>
                
                <div id="listaOpcoes" class="lista-suspensa hidden">
                    <h3>Escolha a data:</h3>
                    <div class="opcoes-container">
                        <label class="item-lista">
                            <input type="radio" name="opcao_unica" value="03/05 - Kennedy 08 as 10"> 03/05 - Kennedy 08 as 10 
                        </label>
                        <label class="item-lista">
                            <input type="radio" name="opcao_unica" value="07/06 - Penka 10 as 12"> 07/06 - Penka 10 as 12 
                        </label>
                        <label class="item-lista">
                            <input type="radio" name="opcao_unica" value="12/07 - Cancum 20 as 22"> 12/07 - Cancum 20 as 22 
                        </label>
                    </div>
                    <!-- Botão Limpar continua caso o usuário queira desmarcar antes de fechar -->
                    <button type="button" id="limparModal" class="btn-limpar">Limpar</button>
                </div>
            
                <div id="areaResultado" class="badge-resultado hidden">
                    <span id="textoResultado"></span>
                    <button id="removerSelecao" class="btn-remover">×</button>
                </div>
            </div>
            

    </main>
    
    <script src="src/javascript/script.js"></script>
    
    <script>
  const btnAbrir = document.getElementById('abrirModal');
const lista = document.getElementById('listaOpcoes');
const areaResultado = document.getElementById('areaResultado');
const textoResultado = document.getElementById('textoResultado');
const radios = document.querySelectorAll('input[name="opcao_unica"]');
const btnFecharLista = document.getElementById('fecharLista');

// 1. Abre/Fecha a lista
btnAbrir.addEventListener('click', (e) => {
    e.stopPropagation(); // Impede o clique de chegar no 'window'
    lista.classList.toggle('hidden');
});

// 2. Seleção automática
radios.forEach(radio => {
    radio.addEventListener('change', () => {
        if (radio.checked) {
            textoResultado.innerText = radio.value;
            areaResultado.classList.remove('hidden'); // MOSTRA o badge completo
            lista.classList.add('hidden');
        }
    });
});

// 3. Botão Remover (X) do Badge
document.getElementById('removerSelecao').addEventListener('click', () => {
    areaResultado.classList.add('hidden'); // ESCONDE o badge completo (texto + botão X)
    textoResultado.innerText = "";
    radios.forEach(r => r.checked = false);
});

// 4. Botão Fechar da Lista (o novo "X" da lista)
btnFecharLista.addEventListener('click', () => {
    lista.classList.add('hidden');
});

// 5. Fechar ao clicar fora da lista
window.addEventListener('click', (e) => {
    if (!lista.contains(e.target) && e.target !== btnAbrir) {
        lista.classList.add('hidden');
    }
});


</script>

</body>
</html>
