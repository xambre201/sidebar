<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/css/styles.css">
    <title>Sidebar</title>
</head>
<body>
    <nav id="sidebar">
        <div id="sidebar_content">
            <div id="user">
                <img src="src/images/gprec.png" id="user_avatar" alt="Avatar">
    
                <p id="user_infos">
                    <span class="item-description">
                        PELADAS DO G8
                    </span>
                    <span class="item-description">
                        PC Kennedy
                    </span>
                </p>
            </div>
    
            <ul id="side_items">
                <li class="side-item active">
                    <a href="#">
                        <i class="fa-solid fa-chart-line"></i>
                        <span class="item-description">
                            Dashboard
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-user"></i>
                        <span class="item-description">
                            Usuários
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-bell"></i>
                        <span class="item-description">
                            Notificações
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-box"></i>
                        <span class="item-description">
                            Produtos
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-image"></i>
                        <span class="item-description">
                            Imagens
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-gear"></i>
                        <span class="item-description">
                            Configurações
                        </span>
                    </a>
                </li>
            </ul>
    
            <button id="open_btn">
                <i id="open_btn_icon" class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <div id="logout">
            <button id="logout_btn">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="item-description">
                    Logout
                </span>
            </button>
        </div>
    </nav>

    <main>
       <div class="container-selecao">
            <button id="abrirModal">Selecione Agenda</button>
            </br>
            <div id="areaResultado" class="badge-resultado">
                <span id="textoResultado"></span>
                <button id="removerSelecao" class="btn-remover" title="Remover seleção">×</button>
            </div>
        </div>

    <dialog id="meuModal">
        <h3>Escolha a data:</h3>
        <form id="formSelecao" method="dialog">
            <label class="item-lista">
                <input type="radio" name="opcao_unica" value="Item 1"> Item 1
            </label>
            <label class="item-lista">
                <input type="radio" name="opcao_unica" value="Item 2"> Item 2
            </label>
            <label class="item-lista">
                <input type="radio" name="opcao_unica" value="Item 3"> Item 3
            </label>
    
            <div class="botoes-modal">
                <button type="button" id="limparModal" class="btn-limpar">Limpar</button>
                <button type="submit" id="confirmar" class="btn-confirmar">Confirmar</button>
            </div>
        </form>
    </dialog>


    </main>
    
    <script src="src/javascript/script.js"></script>
    
    <script>
    // Garante que o código só rode após o HTML carregar completamente
    document.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById('meuModal');
        const btnAbrir = document.getElementById('abrirModal');
        const btnConfirmar = document.getElementById('confirmar');
        const btnLimparModal = document.getElementById('limparModal');
        const btnRemoverGeral = document.getElementById('removerSelecao');
        
        const areaResultado = document.getElementById('areaResultado');
        const textoResultado = document.getElementById('textoResultado');
        const form = document.getElementById('formSelecao');

        // Verifica se os elementos básicos existem antes de atribuir eventos
        if (btnAbrir && modal) {
            btnAbrir.onclick = () => {
                modal.showModal();
            };
        }

        if (btnConfirmar) {
            btnConfirmar.onclick = (e) => {
                const selecionado = document.querySelector('input[name="opcao_unica"]:checked');
                if (selecionado) {
                    textoResultado.textContent = selecionado.value;
                    areaResultado.style.visibility = "visible";
                }
            };
        }

        if (btnLimparModal) {
            btnLimparModal.onclick = () => {
                form.reset();
            };
        }

        if (btnRemoverGeral) {
            btnRemoverGeral.onclick = () => {
                form.reset();
                areaResultado.style.visibility = "hidden";
                textoResultado.textContent = "";
            };
        }
    });
</script>

</body>
</html>
